<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS Official - Baglung (Date Range Ledger)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --gov-blue: #1a237e; 
            --gov-red: #d32f2f; 
            --mustard: #ffca28; 
            --dark-surface: #0f172a;
        }
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        
        .no-print { padding-bottom: 60px; }
        .gov-header { background: linear-gradient(135deg, var(--gov-blue) 0%, #0d47a1 100%); color: white; padding: 1.25rem; border-bottom: 5px solid var(--gov-red); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        
        /* Premium Security Gateway Design */
        #loginScreen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a); 
            z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 440px; border-radius: 24px; padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .login-container:hover { transform: translateY(-4px); }
        .lock-icon-wrapper {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--gov-red), #b71c1c);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 8px 20px rgba(211, 47, 47, 0.4);
            color: white; font-size: 1.8rem;
        }
        .login-input {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: white !important; padding: 12px 16px 12px 42px !important; border-radius: 12px !important;
            transition: all 0.2s ease;
        }
        .login-input:focus {
            background: rgba(255, 255, 255, 0.14) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1) !important;
        }
        .login-input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-group-text-custom {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            z-index: 10; color: rgba(255, 255, 255, 0.5); font-size: 1.1rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white;
            border: none; padding: 14px; border-radius: 12px; font-weight: 600; letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); transition: all 0.2s ease;
        }
        .btn-login:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); transform: translateY(-1px); }
        .btn-login:active { transform: translateY(1px); }

        /* Compulsory Date Styling */
        .date-container { position: relative; border: 2px solid var(--gov-red); border-radius: 12px; padding: 15px; background: #fff5f5; transition: 0.3s; }
        .date-container.missing { animation: shake 0.5s; border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .badge-required { font-size: 0.7rem; background: var(--gov-red); color: white; padding: 2px 8px; border-radius: 4px; vertical-align: middle; margin-left: 10px; text-transform: uppercase; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .card { border: none; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.05); }
        .lic-box { background-color: #e3f2fd; border: 2px solid #2196f3; padding: 10px; border-radius: 8px; }
        .rmis-box { background-color: #f3e5f5; border: 2px dashed #9c27b0; padding: 10px; border-radius: 8px; }
        .cheque-area { background: linear-gradient(to right, #fff9c4, #fffde7); border: 2px solid #fbc02d; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        
        .status-match { background-color: #2e7d32 !important; color: white !important; border: 2px solid #1b5e20; }
        .status-mismatch { background-color: #d32f2f !important; color: white !important; border: 2px solid #b71c1c; }
        
        .nav-tabs { border-bottom: 2px solid #e2e8f0; }
        .nav-tabs .nav-link { font-weight: 600; color: #64748b; border: none; padding: 12px 20px; }
        .nav-tabs .nav-link.active { background-color: transparent; color: var(--gov-blue) !important; border-bottom: 3px solid var(--gov-blue); }

        /* PRINT STYLES */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            .no-print { display: none !important; }
            #loginScreen { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; font-size: 11pt !important; color: black; }
            
            .print-ledger-mode { display: block !important; background: white !important; padding: 0 !important; box-shadow: none !important; }
            .print-ledger-mode .table-responsive { overflow: visible !important; }
            .print-ledger-mode table { width: 100% !important; border-color: #000 !important; font-size: 10pt !important; }
            .print-ledger-mode th { background-color: #f2f2f2 !important; color: black !important; -webkit-print-color-adjust: exact; }

            .voucher-shell { border: 4px solid #000; padding: 35px; min-height: 275mm; display: flex; flex-direction: column; }
            .v-header { text-align: center; border-bottom: 5px double #000; margin-bottom: 25px; }
            .v-header h2 { font-weight: 900; font-size: 28pt; margin: 0; }
            .date-strip { text-align: center; font-size: 18pt; font-weight: bold; background: #f0f0f0 !important; padding: 12px; border: 2px solid #000; margin-bottom: 25px; -webkit-print-color-adjust: exact; }
            .v-table { width: 100%; border-collapse: collapse; }
            .v-table th, .v-table td { border: 1px solid black; padding: 15px; font-size: 14pt; }
            .v-table th { background: #eee !important; -webkit-print-color-adjust: exact; }
            .total-section { border: 4px solid black; padding: 20px; margin-top: 30px; text-align: center; }
            .total-amt { font-size: 28pt; font-weight: 900; }
            .words-area { margin-top: 20px; font-size: 15pt; border-bottom: 2px solid #000; padding-bottom: 10px; line-height: 1.6; }
            .audit-line { margin-top: 15px; padding: 10px; text-align: center; font-weight: bold; border: 2px solid #000; -webkit-print-color-adjust: exact; }
        }
        @media screen { .print-only { display: none; } }
    </style>
</head>
<body>

<!-- GATEWAY LOGIN POPUP INTERFACE -->
<div id="loginScreen">
    <div class="login-container">
        <div class="lock-icon-wrapper">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h4 class="fw-bold text-white text-center mb-1" style="letter-spacing: 0.5px;">VRS Cryptographic Gate</h4>

            <input type="text" id="userInputId" class="form-control login-input" placeholder="Secure Username" autocomplete="off">

            <i class="bi bi-unlock-fill"></i> INITIALIZE SESSION

    </div>
</div>

<!-- CONTAINER FOR INNER WORKSPACE DOM INJECTION -->
<div id="systemContentMountPoint"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Configuration: Deployed Google Apps Script Web App Endpoint URL Target
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxRgr4cKZEFrZpHPzMyPifoBS5GFlSiMazZCQiO6UWI_tvU4GNTxclhEJ9kWMV2b959/exec";

    // User session properties
    let sessionUser = "";
    let sessionPass = "";
    let sessionRole = "";
    let allReportsCache = [];

    // Pure DOM Obfuscated Layout Framework Template 
    const OBFUSCATED_APP_LAYOUT = `
        <div class="gov-header d-flex justify-content-between align-items-center px-4 no-print">
            <div class="text-center mx-auto">
                <h1 class="m-0 h2 fw-bold">गण्डकी प्रदेश</h1>
                <h3 class="m-0 h5 mt-1 opacity-90">यातायात व्यवस्था कार्यालय बागलुङ (VRS/EDLRS)</h3>
            </div>
            <button class="btn btn-sm btn-outline-light fw-bold px-3 d-flex align-items-center gap-1" onclick="handleSystemLogout()">
                <i class="bi bi-box-arrow-right"></i> Terminate (<span id="displayUser"></span>)
            </button>
        </div>

        <div class="container mt-4">
            <ul class="nav nav-tabs mb-4 no-print" id="appTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="entry-tab" data-bs-toggle="tab" data-bs-target="#entryView" type="button">📝 Revenue Entry Form</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="report-tab" data-bs-toggle="tab" data-bs-target="#reportView" type="button" onclick="fetchReports()">📊 Date-Wise Account Reports</button>
                </li>
                <li class="nav-item ms-auto d-none" id="adminTabLi">
                    <button class="nav-link text-danger fw-bold" id="admin-tab" data-bs-toggle="tab" data-bs-target="#adminView" type="button"><i class="bi bi-shield-lock-fill"></i> Admin Panel</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- TAB 1: ENTRY WORKSPACE FORM -->
                <div class="tab-pane fade show active no-print" id="entryView" role="tabpanel">
                    <div class="row g-4">
                        <div class="col-lg-7">
                            <div class="card p-4">
                                <div class="date-container mb-4" id="dateWrapper">
                                    <label class="fw-bold text-danger h5">Nepali B.S. Date <span class="badge-required">Compulsory</span></label>
                                    <input type="text" id="bsDate" class="form-control form-control-lg border-danger" placeholder="उदाहरण: २०८२-१०-२५" oninput="update()">
                                </div>

                                <h5 class="fw-bold mb-3 text-secondary">Revenue Classification (Title-Wise)</h5>
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="small fw-bold">33341 (सवारी कर)</label><input type="number" id="h33341" class="form-control" value="0" oninput="update()"></div>
                                    <div class="col-md-6"><label class="small fw-bold">14225 (रुट पर्मिट)</label><input type="number" id="h14225" class="form-control" value="0" oninput="update()"></div>
                                    <div class="col-md-6"><label class="small fw-bold">14256 (नविकरण)</label><input type="number" id="h14256" class="form-control" value="0" oninput="update()"></div>
                                    <div class="col-md-6"><label class="small fw-bold">11111 (आयकर)</label><input type="number" id="h11111" class="form-control" value="0" oninput="update()"></div>
                                    <div class="col-md-6">
                                        <div class="lic-box"><label class="small fw-bold text-primary">License (Adds to 14256)</label><input type="number" id="lic" class="form-control border-primary" value="0" oninput="update()"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="rmis-box"><label class="small fw-bold" style="color:#9c27b0">RMIS (Reference Only)</label><input type="number" id="rmis" class="form-control border-purple" value="0" oninput="update()"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-5">
                            <div class="card p-4 shadow-sm" style="background:#fffde7; border-left: 10px solid var(--mustard);">
                                <h5 class="fw-bold mb-3">Money Audit (Cash + Cheque)</h5>
                                <div class="cheque-area">
                                    <label class="fw-bold text-dark small">Total Cheque Amount</label>
                                    <input type="number" id="chequeAmt" class="form-control border-warning" value="0" oninput="update()">
                                </div>

                                <div id="cashItems"></div>
                                <hr>
                                <div class="d-flex justify-content-between fw-bold h5 mb-0">
                                    <span>Total Money Handled:</span>
                                    <span id="moneySumUI">0</span>
                                </div>
                                
                                <div id="uiStatus" class="p-3 text-center rounded-3 fw-bold mt-3 shadow-sm"></div>
                                
                                <button id="saveBtn" class="btn btn-success w-100 py-2 mt-4 fw-bold shadow-sm" onclick="saveToDatabase()">
                                    📁 SAVE DATA TO GOOGLE SHEET
                                </button>
                                <button class="btn btn-primary w-100 py-3 mt-2 fw-bold shadow-lg" onclick="validateAndPrint()">
                                    🖨️ GENERATE & PRINT VOUCHER
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TAB 2: ACCOUNT REPORT HISTORIES WITH DATE-RANGE FILTER -->
                <div class="tab-pane fade print-ledger-mode" id="reportView" role="tabpanel">
                    <div class="print-only text-center mb-4">
                        <h2>यातायात व्यवस्था कार्यालय बागलुङ</h2>
                        <h5 class="text-secondary m-0">सवारी तथा संकलित राजस्व विवरण सूची लेखा लेजर</h5>
                        <hr style="border-top: 3px double #000;">
                    </div>

                    <div class="card p-4">
                        <div class="row align-items-center g-3 mb-4 no-print">
                            <div class="col-xl-3 col-md-12">
                                <h4 class="fw-bold text-secondary m-0">Date-Wise Ledger Entries</h4>
                            </div>
                            <div class="col-xl-5 col-md-9">
                                <div class="input-group">
                                    <span class="input-group-text bg-light fw-bold small text-muted">From (B.S.)</span>
                                    <input type="text" id="dateFrom" class="form-control" placeholder="२०८२-१०-०१">
                                    <span class="input-group-text bg-light fw-bold small text-muted">To (B.S.)</span>
                                    <input type="text" id="dateTo" class="form-control" placeholder="२०८२-१०-३०">
                                    <button class="btn btn-primary fw-bold px-3" onclick="filterReportsByRange()">🔍 Filter</button>
                                </div>
                            </div>
                            <div class="col-xl-4 col-md-3 d-flex gap-2 justify-content-md-end">
                                <button class="btn btn-outline-secondary small fw-bold" onclick="clearDateFilter()">Clear</button>
                                <button class="btn btn-outline-primary fw-bold" onclick="fetchReports()">🔄</button>
                                <button class="btn btn-dark fw-bold px-3" onclick="window.print()">🖨️ Print Ledger</button>
                            </div>
                        </div>
                        
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped table-hover align-middle text-center small">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Date (B.S.)</th>
                                        <th>33341<br>Vehicle Tax</th>
                                        <th>14225<br>Route Permit</th>
                                        <th>14256<br>Renewals</th>
                                        <th>11111<br>Income Tax</th>
                                        <th>License</th>
                                        <th>RMIS</th>
                                        <th>Cheque</th>
                                        <th class="table-primary text-dark">Total Revenue</th>
                                    </tr>
                                </thead>
                                <tbody id="reportTableBody">
                                    <tr>
                                        <td colspan="9" class="text-muted p-4">Select Refresh or click tab to initialize query data logs...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- TAB 3: ADMIN PANEL (HIDDEN BY DEFAULT) -->
                <div class="tab-pane fade no-print" id="adminView" role="tabpanel">
                    <div class="row justify-content-center mt-4">
                        <div class="col-md-6">
                            <div class="card p-4 border-danger">
                                <h4 class="fw-bold text-danger mb-4"><i class="bi bi-person-plus-fill"></i> Create System User</h4>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">New Username</label>
                                    <input type="text" id="regUser" class="form-control" placeholder="e.g. clerk_hari">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">New Password</label>
                                    <input type="password" id="regPass" class="form-control" placeholder="Enter secure password">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-bold small text-muted">Account Permission Level</label>
                                    <select id="regRole" class="form-select">
                                        <option value="user">Standard Clerk (Entry & View Only)</option>
                                        <option value="admin">Administrator (Full Access)</option>
                                    </select>
                                </div>
                                <button id="btnCreateUser" class="btn btn-danger w-100 fw-bold py-2" onclick="createNewUser()">
                                    REGISTER USER ACCOUNT
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- VOUCHER STATEMENT OVERLAY ONLY ACCESSED VIA PRINT -->
        <div class="print-only">
            <div class="voucher-shell">
                <div class="v-header">
                    <h2>यातायात व्यवस्था कार्यालय बागलुङ </h2>
                    <p style="font-size: 16pt;">गण्डकी प्रदेश सरकार | Daily Revenue Statement</p>
                </div>
                <div class="date-strip">मिति (B.S.): <span id="pDate"></span></div>
                <table class="v-table">
                    <thead>
                        <tr><th width="15%">Head</th><th width="55%">Title Classification</th><th width="30%" style="text-align: right;">Amount (Rs.)</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>33341</td><td>सवारी कर (Vehicle Tax)</td><td style="text-align: right;" id="p33341"></td></tr>
                        <tr><td>14256</td><td>स‍ चा अ प/ब्लबुक नविकरण (Fees)</td><td style="text-align: right;" id="p14256"></td></tr>
                        <tr><td>14225</td><td>रुट पर्मिट (Route Permit)</td><td style="text-align: right;" id="p14225"></td></tr>
                        <tr><td>11111</td><td>आयकर (Income Tax)</td><td style="text-align: right;" id="p11111"></td></tr>
                        <tr style="background:#f2f2f2"><td>RMIS</td><td>Reference Record (Non-Adding)</td><td style="text-align: right;" id="pRMIS"></td></tr>
                    </tbody>
                </table>
                <div class="total-section">
                    <div style="font-size: 14pt; font-weight: bold; letter-spacing: 1px;">TOTAL REVENUE COLLECTION</div>
                    <div class="total-amt">Rs. <span id="pTotal"></span> /-</div>
                    <div id="pAuditStatus" class="audit-line"></div>
                </div>
                <div class="words-area"><strong>Amount in Words:</strong> Rupees <span id="pWords"></span> Only.</div>
            </div>
        </div>
    `;

    // Intercept Enter key inside auth form fields
    document.querySelectorAll('#userInputId, #userInputPass').forEach(input => {
        input.addEventListener('keyup', (e) => { if(e.key === 'Enter') handleSystemLogin(); });
    });

    async function handleSystemLogin() {
        const uid = document.getElementById('userInputId').value.trim();
        const upass = document.getElementById('userInputPass').value.trim();
        const alertBox = document.getElementById('loginAlert');
        const loginBtn = document.getElementById('loginBtn');

        if (!uid || !upass) return;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> VERIFYING CREDENTIALS...';
        alertBox.classList.add('d-none');

        try {
            // Ping backend to authenticate
            const secureUrl = `${WEB_APP_URL}?uid=${encodeURIComponent(uid)}&pass=${encodeURIComponent(upass)}&action=login`;
            const response = await fetch(secureUrl);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('loginAlertMsg').innerText = data.error;
                alertBox.classList.remove('d-none');
                document.getElementById('userInputPass').value = "";
            } else if (data.success) {
                // Successful Login!
                sessionUser = uid;
                sessionPass = upass;
                sessionRole = data.role; // Extract role from sheets (admin or user)
                
                // Mount the Application Dashboard
                document.getElementById('loginScreen').style.setProperty('display', 'none', 'important');
                document.getElementById('systemContentMountPoint').innerHTML = OBFUSCATED_APP_LAYOUT;
                
                document.getElementById('displayUser').innerText = sessionUser.toUpperCase();

                // Unhide the Admin panel if user is an admin
                if (sessionRole === "admin") {
                    document.getElementById('adminTabLi').classList.remove('d-none');
                }
                
                initializeDenominations();
                update();
            }
        } catch (err) {
            document.getElementById('loginAlertMsg').innerText = "Network Error: Could not reach Google Servers.";
            alertBox.classList.remove('d-none');
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="bi bi-unlock-fill"></i> INITIALIZE SESSION';
        }
    }

    function handleSystemLogout() {
        sessionUser = ""; sessionPass = ""; sessionRole = "";
        document.getElementById('systemContentMountPoint').innerHTML = ""; 
        document.getElementById('userInputId').value = "";
        document.getElementById('userInputPass').value = "";
        document.getElementById('loginScreen').style.setProperty('display', 'flex', 'important');
    }

    async function createNewUser() {
        const nUser = document.getElementById('regUser').value.trim();
        const nPass = document.getElementById('regPass').value.trim();
        const nRole = document.getElementById('regRole').value;
        const btn = document.getElementById('btnCreateUser');

        if (!nUser || !nPass) { alert("⚠️ Username and password are required."); return; }

        btn.disabled = true;
        btn.innerText = "⏳ Registering User...";

        const payload = {
            userId: sessionUser, password: sessionPass, action: "createUser",
            newUserId: nUser, newPass: nPass, newRole: nRole
        };

        try {
            await fetch(WEB_APP_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });
            alert(`✅ Account '${nUser}' has been successfully broadcasted to the system.`);
            document.getElementById('regUser').value = "";
            document.getElementById('regPass').value = "";
        } catch (error) {
            alert("❌ Network processing timeout.");
        } finally {
            btn.disabled = false;
            btn.innerText = "REGISTER USER ACCOUNT";
        }
    }

    function initializeDenominations() {
        const denoms = [1000, 500, 100, 50, 20, 10, 5, 2, 1];
        const container = document.getElementById('cashItems');
        if(!container) return;
        container.innerHTML = "";
        denoms.forEach(d => {
            container.innerHTML += `
                <div class="row mb-1 g-1 align-items-center">
                    <div class="col-4 small fw-bold text-muted">Rs. ${d}</div>
                    <div class="col-8"><input type="number" class="form-control form-control-sm c-in" data-val="${d}" value="0" oninput="update()"></div>
                </div>`;
        });
    }

    function numberToWords(num) {
        if (num === 0) return 'Zero';
        const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
        const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
        const format = (n, s) => {
            let str = "";
            if (n > 19) str += b[Math.floor(n / 10)] + " " + a[n % 10];
            else str += a[n];
            if (n !== 0) str += s;
            return str;
        };
        let words = "";
        words += format(Math.floor(num / 10000000), "Crore ");
        words += format(Math.floor((num / 100000) % 100), "Lakh ");
        words += format(Math.floor((num / 1000) % 100), "Thousand ");
        words += format(Math.floor((num / 100) % 10), "Hundred ");
        if (num > 100 && num % 100 !== 0) words += "and ";
        words += format(num % 100, "");
        return words.trim();
    }

    function update() {
        if (!document.getElementById('bsDate')) return;

        const bs = document.getElementById('bsDate').value;
        const v1 = parseFloat(document.getElementById('h33341').value) || 0;
        const v2 = parseFloat(document.getElementById('h14256').value) || 0;
        const lic = parseFloat(document.getElementById('lic').value) || 0;
        const v3 = parseFloat(document.getElementById('h14225').value) || 0;
        const v4 = parseFloat(document.getElementById('h11111').value) || 0;
        const rm = parseFloat(document.getElementById('rmis').value) || 0;
        const chq = parseFloat(document.getElementById('chequeAmt').value) || 0;

        const merged14256 = v2 + lic;
        const totalRev = v1 + merged14256 + v3 + v4;

        let cashOnly = 0;
        document.querySelectorAll('.c-in').forEach(i => {
            cashOnly += (parseFloat(i.getAttribute('data-val')) * (parseFloat(i.value) || 0));
        });
        const totalMoneyHandled = cashOnly + chq;

        const gap = totalMoneyHandled - totalRev;
        const uiStatus = document.getElementById('uiStatus');
        const pStatus = document.getElementById('pAuditStatus');

        if (gap === 0) {
            uiStatus.innerText = "✅ REVENUE BALANCED";
            uiStatus.className = "p-3 text-center rounded-3 fw-bold mt-3 shadow-sm status-match";
            pStatus.innerText = "AUDIT STATUS: BALANCED (CASH & CHEQUE MATCHED)";
            pStatus.style.backgroundColor = "#e8f5e9";
            pStatus.style.color = "#2e7d32";
        } else {
            uiStatus.innerText = "⚠️ MISMATCHED: Rs. " + gap.toLocaleString();
            uiStatus.className = "p-3 text-center rounded-3 fw-bold mt-3 shadow-sm status-mismatch";
            pStatus.innerText = "⚠️ AUDIT MISMATCH: Rs. " + gap.toLocaleString() + " DIFFERENCE";
            pStatus.style.backgroundColor = "#ffebee";
            pStatus.style.color = "#d32f2f";
        }

        document.getElementById('pDate').innerText = bs || "________________";
        document.getElementById('p33341').innerText = v1.toLocaleString();
        document.getElementById('p14256').innerText = merged14256.toLocaleString();
        document.getElementById('p14225').innerText = v3.toLocaleString();
        document.getElementById('p11111').innerText = v4.toLocaleString();
        document.getElementById('pRMIS').innerText = rm.toLocaleString();
        document.getElementById('pTotal').innerText = totalRev.toLocaleString();
        document.getElementById('pWords').innerText = numberToWords(totalRev);
        document.getElementById('moneySumUI').innerText = totalMoneyHandled.toLocaleString();
        
        if(bs) document.getElementById('dateWrapper').classList.remove('missing');
    }

    async function saveToDatabase() {
        const bsDate = document.getElementById('bsDate').value.trim();
        if (!bsDate) {
            document.getElementById('dateWrapper').classList.add('missing');
            alert("🛑 ERROR: Nepali B.S. Date is required to log data.");
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "⏳ SECURELY LOGGING TO GOOGLE SHEET...";

        const payload = {
            userId: sessionUser, password: sessionPass, action: "saveLedger", bsDate: bsDate,
            h33341: parseFloat(document.getElementById('h33341').value) || 0,
            h14225: parseFloat(document.getElementById('h14225').value) || 0,
            h14256: parseFloat(document.getElementById('h14256').value) || 0,
            h11111: parseFloat(document.getElementById('h11111').value) || 0,
            lic: parseFloat(document.getElementById('lic').value) || 0,
            rmis: parseFloat(document.getElementById('rmis').value) || 0,
            chequeAmt: parseFloat(document.getElementById('chequeAmt').value) || 0,
            totalRev: (parseFloat(document.getElementById('h33341').value) || 0) + 
                      ((parseFloat(document.getElementById('h14256').value) || 0) + (parseFloat(document.getElementById('lic').value) || 0)) + 
                      (parseFloat(document.getElementById('h14225').value) || 0) + 
                      (parseFloat(document.getElementById('h11111').value) || 0)
        };

        try {
            await fetch(WEB_APP_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });
            alert("✅ Entry request broadcasted! Refresh history list tab to confirm ledger status sync.");
        } catch (error) {
            alert("❌ Network processing timeout.");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "📁 SAVE DATA TO GOOGLE SHEET";
        }
    }

    async function fetchReports() {
        const tbody = document.getElementById('reportTableBody');
        tbody.innerHTML = `<tr><td colspan="9" class="text-primary fw-bold p-4">⏳ Verifying credentials and fetching ledger history...</td></tr>`;

        try {
            const secureUrl = `${WEB_APP_URL}?uid=${encodeURIComponent(sessionUser)}&pass=${encodeURIComponent(sessionPass)}&action=fetch`;
            const response = await fetch(secureUrl);
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);
            
            allReportsCache = data.reverse(); 
            renderTable(allReportsCache);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-danger p-4">❌ Access Blocked or Request Failed: ${err.message}</td></tr>`;
        }
    }

    function renderTable(dataset) {
        const tbody = document.getElementById('reportTableBody');
        if (!tbody) return;
        if (dataset.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-muted p-4">No report logs found matching data points.</td></tr>`;
            return;
        }

        tbody.innerHTML = dataset.map(row => `
            <tr>
                <td class="fw-bold text-dark">${row.bsDate}</td>
                <td>${Number(row.h33341 || row.h11451 || 0).toLocaleString()}</td>
                <td>${Number(row.h14225).toLocaleString()}</td>
                <td>${Number(row.h14256 || row.h11621 || 0).toLocaleString()}</td>
                <td>${Number(row.h11111).toLocaleString()}</td>
                <td class="text-primary">${Number(row.lic).toLocaleString()}</td>
                <td class="text-purple">${Number(row.rmis).toLocaleString()}</td>
                <td class="text-warning bg-light">${Number(row.chequeAmt).toLocaleString()}</td>
                <td class="fw-bold bg-light text-success">${Number(row.totalRev).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    function filterReportsByRange() {
        const fromDate = document.getElementById('dateFrom').value.trim();
        const toDate = document.getElementById('dateTo').value.trim();
        if (!fromDate && !toDate) { alert("⚠️ Please enter at least one date validation constraint."); return; }
        const filtered = allReportsCache.filter(item => {
            const itemDate = item.bsDate.trim();
            let matchFrom = true; let matchTo = true;
            if (fromDate) matchFrom = (itemDate >= fromDate);
            if (toDate) matchTo = (itemDate <= toDate);
            return matchFrom && matchTo;
        });
        renderTable(filtered);
    }
    
    function clearDateFilter() { document.getElementById('dateFrom').value = ""; document.getElementById('dateTo').value = ""; renderTable(allReportsCache); }
    
    function validateAndPrint() {
        const dateInput = document.getElementById('bsDate');
        if (!dateInput || !dateInput.value.trim()) {
            document.getElementById('dateWrapper').classList.add('missing');
            alert("🛑 COMPULSORY ERROR: Enter the Nepali B.S. Date before printing.");
            if(dateInput) dateInput.focus();
            return;
        }
        window.print();
    }
</script>
